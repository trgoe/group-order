<!doctype html>
<html lang="bs">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Order</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Group Order</h1>

      <input id="menuUrl" placeholder="Ubaci Korpa partner link..." />

      <button onclick="clearAll()">Reset</button>

      <input id="personName" placeholder="Tvoje ime" />

    <h2>Artikli</h2>
    <div id="items"></div>

    <h2>Ukupno za narudžbu</h2>
    <div id="summary"></div>
  </main>

  <script src="app.js"></script>

</html>
